    white-space: nowrap !important;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15) !important;
    opacity: 0 !important;
    transform: translateX(15px) scale(0.95) !important;
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) !important; /* Efecto rebote */
    pointer-events: none !important;
}

#tcr-header-root .tooltip-text::after {
    content: '' !important;
    position: absolute !important;
    top: 50% !important;
    right: -8px !important;
    margin-top: -8px !important;
    border-width: 8px !important;
    border-style: solid !important;
    border-color: transparent transparent transparent white !important;
}

#tcr-header-root .floating-whatsapp-btn:hover .tooltip-text {
    opacity: 1 !important;
    transform: translateX(0) scale(1) !important;
}

/* === RESPONSIVE === */
@media (max-width: 992px) {
    #tcr-header-root .nav-links { display: none !important; }
    #tcr-header-root .mobile-toggle { display: flex !important; }
    #tcr-header-root .desktop-only { display: none !important; }
    #tcr-header-root .top-bar { display: none !important; } 
    #tcr-header-root .main-nav { padding: 12px 0 !important; }
    #tcr-header-root .logo-icon-box { width: 42px !important; height: 42px !important; font-size: 18px !important; border-radius: 10px !important; }
    #tcr-header-root .brand-name { font-size: 22px !important; }
    #tcr-header-root .brand-sub { font-size: 10px !important; }
    #tcr-header-root .floating-whatsapp-btn { width: 55px !important; height: 55px !important; font-size: 28px !important; bottom: 25px !important; right: 25px !important; }

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const root = document.getElementById('tcr-header-root');
    
    // === LÓGICA DE ACTIVE STATE (URL) ===
    const setActiveState = () => {
        const path = window.location.pathname;
        const allLinks = root.querySelectorAll('.nav-link, .mobile-link');
        
        allLinks.forEach(link => {
            const href = link.getAttribute('href');
            // Comparación exacta para rutas raíz y subpáginas
            if (href === path || (href !== '/' && path.startsWith(href))) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    };
    
    setActiveState();
    // Escuchar cambios de ruta si se usa un router de SPA (opcional, por si acaso)
    window.addEventListener('popstate', setActiveState);

    // === INTERACTIVIDAD MENÚ MÓVIL & SCROLL ===
    const mobileToggle = root.querySelector('.mobile-toggle');
    const closeOffcanvas = root.querySelector('.close-offcanvas');
    const offcanvasOverlay = root.querySelector('.mobile-offcanvas-overlay');
    const backdrop = root.querySelector('.blur-backdrop');

    const handleScroll = () => {
        if (window.scrollY > 30) { // Umbral más bajo para reacción rápida
            root.classList.add('scrolled');
        } else {
            root.classList.remove('scrolled');
        }
    };
    window.addEventListener('scroll', handleScroll, { passive: true }); // Passive para mejor rendimiento
    handleScroll();

    const openMenu = () => {
        offcanvasOverlay.classList.add('active');
        document.body.style.overflow = 'hidden'; // Evitar scroll del body
    };

    const closeMenuFunc = () => {
        offcanvasOverlay.classList.remove('active');
        document.body.style.overflow = ''; // Restaurar scroll
    };

    mobileToggle.addEventListener('click', openMenu);
    closeOffcanvas.addEventListener('click', closeMenuFunc);
    backdrop.addEventListener('click', closeMenuFunc);

    const mobileLinks = root.querySelectorAll('.mobile-link');
    mobileLinks.forEach(link => {
        link.addEventListener('click', closeMenuFunc);
    });
});
</script>
